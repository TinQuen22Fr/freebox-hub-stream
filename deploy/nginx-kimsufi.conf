# /etc/nginx/sites-available/surveillance-video.conf
# Reverse proxy for camera-hub-personal on the Kimsufi (OVH Roubaix).
# Pattern aligned with your existing sqm.quentin-astro.fr / storm-monitor.quentin-astro.fr.
# Run `certbot --nginx -d surveillance-video.quentin-astro.fr` to add TLS automatically.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name surveillance-video.quentin-astro.fr;

    # ---- Frontend (React build served by the frontend container :8088) ----
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- API + WebSocket proxy (FastAPI :8001) ----
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;          # required for /api/ws (live MSE)
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;                         # keep WS streams alive
        proxy_buffering off;                              # low-latency streaming
        client_max_body_size 50m;
    }
}
