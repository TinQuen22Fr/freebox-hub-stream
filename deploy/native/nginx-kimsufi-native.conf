# /etc/nginx/sites-available/surveillance-video.conf  (installation NATIVE, sans Docker)
# nginx sert directement le build React + proxy /api (avec WebSocket) vers FastAPI :8001.
# Puis : sudo certbot --nginx -d surveillance-video.quentin-astro.fr

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name surveillance-video.quentin-astro.fr;

    # Frontend statique (build React)
    root /opt/camera-hub/app/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API + WebSocket live (/api/ws)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        client_max_body_size 50m;
    }
}
