api:
  listen: "127.0.0.1:1984"
  origin: "*"

rtsp:
  listen: "127.0.0.1:8554"

webrtc:
  listen: ":8555"

ffmpeg:
  bin: ffmpeg

log:
  level: info

# NOTE: "demo_*" streams are synthetic test patterns generated by ffmpeg so the
# dashboard shows live video inside the Emergent cloud preview (which cannot reach
# your LAN cameras). Real cameras are injected at runtime by the FastAPI backend
# via the go2rtc API (PUT /api/streams). When self-hosting, remove the demo_* block.
streams:
  demo_entrance: "exec:ffmpeg -hide_banner -loglevel error -re -f lavfi -i testsrc2=size=854x480:rate=12 -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p -g 24 -f rtsp -rtsp_transport tcp {output}"
  demo_garden: "exec:ffmpeg -hide_banner -loglevel error -re -f lavfi -i smptebars=size=854x480:rate=12 -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p -g 24 -f rtsp -rtsp_transport tcp {output}"
  demo_garage: "exec:ffmpeg -hide_banner -loglevel error -re -f lavfi -i testsrc=size=854x480:rate=12 -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p -g 24 -f rtsp -rtsp_transport tcp {output}"
